# evaluate.example.yaml
# ──────────────────────────────────────────────────────────────────────────────
# Example configuration for scripts/evaluate.py.
#
# Usage:
#   cp scripts/evaluate.example.yaml scripts/my_eval.yaml
#   # edit my_eval.yaml with your actual paths and tokens
#   python scripts/evaluate.py --config scripts/my_eval.yaml
#
# Path resolution
# ───────────────
# All relative paths are resolved relative to THIS file's directory, not the
# CWD from which evaluate.py is invoked.  So if this file lives in scripts/,
# then "./agents/MSWE-agent" means scripts/../agents/MSWE-agent relative to
# the project root.  Use "../" to navigate up from scripts/.
#
# ──────────────────────────────────────────────────────────────────────────────


# ── Run settings ──────────────────────────────────────────────────────────────
run:
  # Root directory for all run artefacts.  The sub-directory run-1/ (and
  # future run-N/) will be created here automatically.
  workdir: ../results/my_eval_run

  # Ordered list of pipeline steps to execute.
  # Valid values: "agent", "evaluation"
  # Examples:
  #   Full run:          [agent, evaluation]
  #   Agent only:        [agent]
  #   Evaluation only:   [evaluation]  ← requires `evaluation.config.patch_files` to be set
  steps:
    - agent
    - evaluation

  # Number of independent evaluation runs.
  # Currently ignored: only run-1 is executed.
  # Reserved for future multi-run support (averaging pass rates over N runs).
  N: 1


# ── Per-step configuration ────────────────────────────────────────────────────
steps:

  # ── Agent step ──────────────────────────────────────────────────────────────
  # Runs MSWE-agent on the benchmark file and converts its output.
  # Substeps: checkout → setup → keys.cfg → [run agent] → copy traj → convert
  agent:
    # Path to the MSWE-agent repository root (cloned by bootstrap.py init).
    dir: ../agents/MSWE-agent

    # Git branch to checkout before doing anything else.
    # The metamorphic-testing branch applies metamorphic_base_patch during
    # Docker image build, which is required for metamorphic benchmarks.
    branch: vartiukhov/metamorphic-testing

    # Python environment setup for MSWE-agent.
    setup:
      # Venv path relative to agent dir.
      venv: ./.venv

      # Commands run WITHOUT the venv (venv may not exist yet).
      # Executed once when the venv is absent; skipped on subsequent runs.
      prepare:
        - "uv venv"

      # Commands run WITH the venv active (PATH prepended with venv/bin/).
      # Always executed (pip/uv install is idempotent).
      install:
        - "uv pip install -r requirements.txt"

    # API token configuration for `keys.cfg`.
    # MSWE-agent reads `keys.cfg` from its repo root; format: KEY="value"
    keys:
      path: ./keys.cfg        # relative to agent dir
      override: false         # set true to regenerate on every run

      # Token key-value pairs written to keys.cfg.
      # Add any tokens required by your chosen model.
      values:
        OPENAI_API_KEY: "your-openai-key-here"
        ANTHROPIC_API_KEY: "your-anthropic-key-here"

    # Runner configuration.
    runner:
      # false → run.py  (serial, one instance at a time)
      # true  → multirun.py (parallel; sets RUNNING_THREADS env var)
      parallel: false
      threads: 16             # RUNNING_THREADS value; only used when parallel=true

    # Whether to copy the trajectory folder into the run archive.
    # true  → full copy to {workdir}/run-1/trajectories/ (recommended)
    # false → trajectory stays in agents/MSWE-agent/trajectories/;
    #         the source path is still recorded in result.json
    copy_trajectories: true

    # Output routing for the MSWE-agent subprocess.
    # stdout is always written to {workdir}/run-N/agent.log (never pollutes evaluate.log).
    # stderr is always written to agent.log too.
    # stream_output: false (default) → stderr is silent in evaluate.log (recommended for long runs)
    # stream_output: true            → stderr is also forwarded to evaluate.log in real time
    stream_output: false

    # MSWE-agent CLI parameters (map 1-to-1 to run.py / multirun.py flags).
    config:
      model_name: gpt4o

      # Input benchmark JSONL file (normal or metamorphic).
      # --pr_file in MSWE-agent's CLI.
      benchmark_file: ../benchmarks/sample.jsonl

      # MSWE-agent config YAML (usually the default is fine).
      config_file: ../agents/MSWE-agent/config/default.yaml

      # Maximum API spend per benchmark instance (USD).
      per_instance_cost_limit: 5.0

      # Sampling parameters.
      # temperature=0.0 → greedy/deterministic output (recommended for benchmarks).
      # top_p (nucleus sampling): only tokens whose cumulative probability ≤ top_p
      #   are considered at each step. 0.95 is the MSWE-agent default.
      # total_cost_limit: hard cap on total API spend across all instances (USD).
      #   0.0 means no cap.
      temperature: 0.0
      top_p: 0.95
      total_cost_limit: 0.0

      # --- Options with sensible defaults (override as needed) ---
      cache_task_images: true
      pre_build_all_images: true
      remove_image: false
      skip_existing: true
      print_config: false
      max_workers_build_image: 16


  # ── Evaluation step ──────────────────────────────────────────────────────────
  # Runs the multi_swe_bench harness and produces final_report.json.
  # Substeps: checkout → setup → resolve patches → generate config.json → [run harness]
  evaluation:
    # Path to the multi_swe_bench repository root (cloned by bootstrap.py init).
    dir: ../swe_bench/multi-swe-bench

    # Git branch to checkout before doing anything else.
    # The metamorphic-testing branch applies metamorphic_base_patch during
    # evaluation, required for metamorphic benchmarks.
    branch: vartiukhov/metamorphic-testing

    # Python environment setup for multi_swe_bench.
    setup:
      venv: ./venv
      prepare:
        - "python3 -m venv ./venv"
      install:
        - "make install"

    # Whether to share a single repos/ folder across all N runs.
    # true  (default) → {workdir}/repos/ is used by every run; repos are cloned
    #         once and reused, saving time on multi-run evaluations.
    #         Safe because the harness leaves repos on their main branch with no
    #         modifications after each evaluation run.
    # false → each run gets its own {workdir}/run-N/eval/repos/ folder.
    share_repos: true

    # Output routing for the multi_swe_bench harness subprocess.
    # stdout is always written to {workdir}/run-N/harness.log (never pollutes evaluate.log).
    # stderr is always written to harness.log too.
    # stream_output: false (default) → stderr is silent in evaluate.log (recommended for long runs)
    # stream_output: true            → stderr is also forwarded to evaluate.log in real time
    stream_output: false

    # Harness configuration.
    # patch_files is intentionally omitted here because it is auto-resolved
    # from the agent step's fix_patches.jsonl when both steps run together.
    #
    # For standalone evaluation (only "evaluation" in run.steps), provide it as:
    #   patch_files:
    #     - ../results/my_eval_run/run-1/predictions/fix_patches.jsonl
    config:
      # REQUIRED: benchmark dataset JSONL file(s).
      # IMPORTANT: the filename MUST contain the language keyword (e.g. "java")
      # so that multi_swe_bench selects the correct evaluation environment.
      dataset_files:
        - ../benchmarks/sample.jsonl

      # patch_files: auto-resolved from agent step output when both steps run.
      # Uncomment and set explicitly only for standalone evaluation runs:
      # patch_files:
      #   - ../results/my_eval_run/run-1/predictions/fix_patches.jsonl

      # --- Options with sensible defaults (override as needed) ---
      force_build: false

      # Set to true to rebuild Docker images on run-1 only.
      # Runs 2..N reuse the images from run-1, saving time in multi-run evaluations.
      # Has no effect when force_build: true (which rebuilds on every run regardless).
      force_build_on_first_run: false

      stop_on_error: true
      need_clone: true
      max_workers: 8
      max_workers_build_image: 8
      max_workers_run_instance: 8
      log_level: DEBUG

      # Filter to specific instance IDs (empty list = run all).
      # Useful for debugging a single failing instance.
      specifics: []

      # Instance IDs to skip entirely.
      skips: []
